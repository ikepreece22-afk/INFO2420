<!DOCTYPE html>
<html>


<head>

<meta charset="UTF-8">
	
<title>HTML Practice 6B - Tables</title>

<style type="text/css">

.center {
    text-align: center;
    margin: 0 auto;
    width: 90%;
}

table, th, td {
    border: 5px solid black;
    border-collapse: separate;
    border-spacing: 10px;
    padding: 8px;
    border-radius: 10px;
}

.header {
    color: #003300;
    font-weight: bold;
    text-align: center;
}

.courses {
    background-color: #CCCCCC;
    width: 25%;
}

.days {
}

.day-header {
    background-color: #99FF66;
}


</style>
</head>
<body>
<div class="center">
   <table >
      <caption class="header">My Class Schedule</caption>
      <colgroup class="courses"></colgroup>
      <colgroup class="days" span="5"></colgroup>
      <tr>
         <th>Courses</th>
         <th class="day-header">Monday</th>
         <th class="day-header">Tuesday</th>
         <th class="day-header">Wednesday</th>
         <th class="day-header">Thursday</th>
         <th class="day-header">Friday</th>
      </tr>
      <tr>
         <th>Info 1120</th>
         <td>&nbsp;</td>
         <td>9 - 11</td>
         <td>&nbsp;</td>
         <td>9 - 11</td>
         <td rowspan="2">&nbsp;</td>
      </tr>
      <tr>
         <th>Math 1010</th>
         <td colspan="4">12 - 1</td>
      </tr>

      <tr>
         <th>Info 2420</th>
         <td colspan="5">Online Available 24/7</td>
      </tr>

   </table>
</div>



</body>
</html>
