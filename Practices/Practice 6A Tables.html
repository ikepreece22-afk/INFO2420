<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Practice 6A Tables</title>
<style> 
  td, th {
    border: 1px solid gray;
  }
  table {
    margin-bottom: 30px;
  }
</style>
</head>

<body>

<table>
    <caption>Exercise 8-1</caption>
    <tr bgcolor="Green">
        <th>Album</th>
        <th>Year</th>
    </tr>
    <tr bgcolor="LightBlue"><td>Rubber Soul</td><td>1965</td></tr>
    <tr bgcolor="LightYellow"><td>Revolver</td><td>1966</td></tr>
    <tr bgcolor="LightBlue"><td>Sgt Pepper's</td><td>1967</td></tr>
    <tr bgcolor="LightYellow"><td>The WWhite Album</td><td>1968</td></tr>
    <tr bgcolor="LightBlue"><td>Abbey Road</td><td>1969</td></tr>



</table>


<table>
    <caption>Exercise 8-2</caption>
    <tr bgcolor="Green" align="center">
        <th width="100">7:00 PM</th>
         <th width="100">7:30 PM</th>
        <th width="100">8:00 PM</th>
    </tr>
    <tr bgcolor="LightBlue" align="center"><td colspan="3">Sunday Night Movie</td></tr>
    <tr bgcolor="LightYellow" align="center"><td>Paul Manson</td><td>Candid Camera</td><td>What's My Line?</td></tr>
    <tr bgcolor="LightBlue" align="center"><td colspan="1">Bonanza</td><td colspan="2">The Wackiest Ship in the Army</td></tr>



</table>


<table>
    <caption>Exercise 8-3</caption>
    <tr align="center">
        <th width="100" bgcolor="LightBlue">Apple</th>
        <th width="100" rowspan="3" bgcolor="LightBlue">Orange</th>
        <th width="100" bgcolor="LightYellow">Pears</th>

    </tr>
    <tr bgcolor="LightBlue" align="center">
        <td>Bananas</td>
        <td rowspan="2"> Pinapple</td>
    </tr>
    <tr bgcolor="LightYellow" align="center">
     <td> lychees</td>
    </tr>

</table>

</body>
</html>
