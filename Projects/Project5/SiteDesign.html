<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color Palette: Native Cooking of Utah</title>
  <style>
    :root {
      /* Colors derived from AboutUs.html */
      --color-1: #CC5500; /* Primary Heading / Native Orange */
      --color-2: #003366; /* Link Color / Dark Blue */
      --color-3: #ADD8E6; /* Page Background / Light Blue */
      --color-4: #E8F4F8; /* Table Cell / Soft Blue */
      --color-5: #663399; /* Visited Link / Purple Accent */
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
    }

    .color-block {
      height: 20vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    /* Assigning the Native Cooking palette */
    .c1 { background: var(--color-1); }
    .c2 { background: var(--color-2); }
    .c3 { background: var(--color-3); color: #000; text-shadow: none; }
    .c4 { background: var(--color-4); color: #000; text-shadow: none; }
    .c5 { background: var(--color-5); }
  </style>
</head>
<body>

  <div class="color-block c1">#CC5500 (Native Orange)</div>
  <div class="color-block c2">#003366 (Dark Blue)</div>
  <div class="color-block c3">#ADD8E6 (Light Blue)</div>
  <div class="color-block c4">#E8F4F8 (Soft Blue)</div>
  <div class="color-block c5">#663399 (Purple Accent)</div>

</body>
</html>
